version: '3.8'

services:
  skysend:
    image: skyfay/skysend:latest
    container_name: skysend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BASE_URL=http://localhost:3000
      - NODE_ENV=production
    volumes:
      - skysend-data:/data
      - skysend-uploads:/uploads

volumes:
  skysend-data:
  skysend-uploads:
